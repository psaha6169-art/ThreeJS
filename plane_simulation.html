<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Airplane Simulator</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #87CEEB; /* Sky blue fallback */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
        #ui-layer {
            position: absolute;
            top: 20px;
            width: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-shadow: 1px 1px 4px rgba(0,0,0,0.5);
        }
        h1 {
            margin: 0;
            font-size: 2rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        p {
            margin: 5px 0 0 0;
            color: #f0f0f0;
            font-size: 1rem;
        }
        #controls-info {
            position: absolute;
            bottom: 20px;
            left: 20px;
            pointer-events: none;
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.9rem;
            background: rgba(0,0,0,0.3);
            padding: 10px 15px;
            border-radius: 8px;
            backdrop-filter: blur(4px);
        }
    </style>
    <!-- Three.js and OrbitControls -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>

    <div id="ui-layer">
        <h1>3D Airplane</h1>
        <p>Built with Three.js Primitives</p>
    </div>
    
    <div id="controls-info">
        <strong>Controls:</strong><br/>
        🖱️ Left Click + Drag: Rotate Camera<br/>
        🖱️ Right Click + Drag: Pan Camera<br/>
        🖱️ Scroll Wheel: Zoom In/Out
    </div>

    <script>
        let scene, camera, renderer, airplane, controls;
        let clouds = [];

        function init() {
            // 1. Scene Setup
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB); // Sky blue
            scene.fog = new THREE.Fog(0x87CEEB, 100, 950);

            // 2. Camera Setup
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 1000);
            camera.position.set(100, 100, 200);

            // 3. Renderer Setup
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);

            // 4. Lighting Setup
            const hemisphereLight = new THREE.HemisphereLight(0xaaaaaa, 0x000000, 0.9);
            const ambientLight = new THREE.AmbientLight(0xdc8874, 0.5);
            const shadowLight = new THREE.DirectionalLight(0xffffff, 0.9);
            
            shadowLight.position.set(150, 350, 350);
            shadowLight.castShadow = true;
            shadowLight.shadow.camera.left = -400;
            shadowLight.shadow.camera.right = 400;
            shadowLight.shadow.camera.top = 400;
            shadowLight.shadow.camera.bottom = -400;
            shadowLight.shadow.camera.near = 1;
            shadowLight.shadow.camera.far = 1000;
            shadowLight.shadow.mapSize.width = 2048;
            shadowLight.shadow.mapSize.height = 2048;

            scene.add(hemisphereLight, shadowLight, ambientLight);

            // 5. Build the Scene Objects
            createAirplane();
            createSky();

            // 6. Controls
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.minDistance = 50;
            controls.maxDistance = 500;

            // 7. Event Listeners
            window.addEventListener('resize', onWindowResize, false);
            
            // Start Loop
            animate();
        }

        function createAirplane() {
            airplane = new THREE.Group();

            // Shared Materials
            const redMat = new THREE.MeshStandardMaterial({color: 0xf25346, flatShading: true});
            const whiteMat = new THREE.MeshStandardMaterial({color: 0xd8d0d1, flatShading: true});
            const blackMat = new THREE.MeshStandardMaterial({color: 0x23190f, flatShading: true});
            const glassMat = new THREE.MeshStandardMaterial({color: 0x59d8fa, transparent: true, opacity: 0.5, flatShading: true});

            // Fuselage (Cabin)
            const geomCabin = new THREE.BoxGeometry(80, 50, 50);
            
            // Fix: Modern Three.js uses BufferGeometry. 
            // We manipulate the attribute array directly to taper the cabin.
            const position = geomCabin.attributes.position;
            for (let i = 0; i < position.count; i++) {
                let x = position.getX(i);
                let y = position.getY(i);
                let z = position.getZ(i);

                // Taper the back of the cabin (negative X side)
                if (x < 0) {
                    position.setY(i, y * 0.7);
                    position.setZ(i, z * 0.5);
                }
                // Taper the top front slightly (positive X side)
                if (x > 0 && y > 0) {
                    position.setY(i, y * 1.2);
                }
            }
            
            const cabin = new THREE.Mesh(geomCabin, redMat);
            cabin.castShadow = true;
            cabin.receiveShadow = true;
            airplane.add(cabin);

            // Engine
            const geomEngine = new THREE.BoxGeometry(20, 50, 50);
            const engine = new THREE.Mesh(geomEngine, whiteMat);
            engine.position.x = 50;
            engine.castShadow = true;
            engine.receiveShadow = true;
            airplane.add(engine);

            // Tail
            const geomTailPlane = new THREE.BoxGeometry(15, 20, 5);
            const tailPlane = new THREE.Mesh(geomTailPlane, redMat);
            tailPlane.position.set(-35, 25, 0);
            tailPlane.castShadow = true;
            tailPlane.receiveShadow = true;
            airplane.add(tailPlane);

            // Wings
            const geomSideWing = new THREE.BoxGeometry(40, 8, 150);
            const sideWing = new THREE.Mesh(geomSideWing, whiteMat);
            sideWing.castShadow = true;
            sideWing.receiveShadow = true;
            airplane.add(sideWing);

            // Propeller
            airplane.propeller = new THREE.Group();
            
            const geomPropellerHub = new THREE.BoxGeometry(20, 10, 10);
            const propellerHub = new THREE.Mesh(geomPropellerHub, blackMat);
            propellerHub.castShadow = true;
            propellerHub.receiveShadow = true;
            
            const geomBlade = new THREE.BoxGeometry(1, 100, 20);
            const blade = new THREE.Mesh(geomBlade, blackMat);
            blade.position.set(8, 0, 0);
            blade.castShadow = true;
            blade.receiveShadow = true;
            
            airplane.propeller.add(propellerHub, blade);
            airplane.propeller.position.set(60, 0, 0);
            airplane.add(airplane.propeller);

            // Cockpit Glass
            const geomGlass = new THREE.BoxGeometry(30, 15, 30);
            const glass = new THREE.Mesh(geomGlass, glassMat);
            glass.position.set(15, 30, 0);
            glass.castShadow = true;
            glass.receiveShadow = true;
            airplane.add(glass);

            scene.add(airplane);
        }

        function createSky() {
            const cloudGeom = new THREE.BoxGeometry(20, 20, 20);
            const cloudMat = new THREE.MeshStandardMaterial({
                color: 0xffffff, 
                flatShading: true,
                transparent: true,
                opacity: 0.8
            });
            
            // Create 40 random clouds
            for(let i = 0; i < 40; i++) {
                const cloud = new THREE.Group();
                const nBlocs = 3 + Math.floor(Math.random() * 4); // 3 to 6 blocks per cloud
                
                for(let j = 0; j < nBlocs; j++) {
                    const m = new THREE.Mesh(cloudGeom, cloudMat);
                    m.position.x = j * 15;
                    m.position.y = Math.random() * 10;
                    m.position.z = Math.random() * 10;
                    m.rotation.z = Math.random() * Math.PI * 2;
                    m.rotation.y = Math.random() * Math.PI * 2;
                    const s = 0.5 + Math.random() * 1.5;
                    m.scale.set(s, s, s);
                    
                    m.castShadow = true;
                    m.receiveShadow = true;
                    cloud.add(m);
                }
                
                // Position clouds around the plane, but not too close
                cloud.position.x = -600 + Math.random() * 1200;
                cloud.position.y = -200 + Math.random() * 400;
                cloud.position.z = -600 + Math.random() * 1200;
                
                // Ensure clouds aren't spawning directly inside the plane
                if(cloud.position.distanceTo(new THREE.Vector3(0,0,0)) > 200) {
                    scene.add(cloud);
                    clouds.push(cloud);
                }
            }
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            
            // Spin the propeller
            if (airplane && airplane.propeller) {
                airplane.propeller.rotation.x += 0.3;
                
                // Add a subtle flying bobbing motion to the plane
                airplane.position.y = Math.sin(Date.now() * 0.003) * 10;
                airplane.rotation.z = Math.sin(Date.now() * 0.002) * 0.1;
                airplane.rotation.x = Math.cos(Date.now() * 0.001) * 0.1;
            }

            // Slowly rotate the clouds to simulate flying forward
            clouds.forEach(cloud => {
                cloud.position.x -= 0.5;
                // reset cloud to the front if it goes too far back
                if (cloud.position.x < -600) {
                    cloud.position.x = 600;
                    cloud.position.y = -200 + Math.random() * 400;
                    cloud.position.z = -600 + Math.random() * 1200;
                }
            });

            // Update orbit controls
            controls.update();

            // Render the scene
            renderer.render(scene, camera);
        }

        // Initialize only after the window has loaded fully
        window.onload = init;
    </script>
</body>
</html>
